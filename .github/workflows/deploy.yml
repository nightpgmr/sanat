name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          npm ci
          npm run build
          touch out/.nojekyll

      - name: Copy built site to repository root
        run: |
          shopt -s dotglob nullglob
          for item in frontend/out/*; do
            name="$(basename "$item")"
            rm -rf "$name"
            cp -r "$item" "$name"
          done
          cp frontend/out/.nojekyll .nojekyll

      - name: Commit and push site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "deploy: update GitHub Pages site [skip ci]"
          git push
